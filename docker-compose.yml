version: '3.9'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - micro-network
  product-service:
    build: ./product-service
    container_name: product-service
    env_file: 
      - ./product-service/.env
    depends_on:
      - product-db
    networks:
      - micro-network

  product-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - product_data:/var/lib/postgresql/data
    networks:
      - micro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
  user-service:
    build: ./user-service
    container_name: user-service
    env_file: 
      - ./user-service/.env
    depends_on:
      - user-db
    networks:
      - micro-network

  user-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5434:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - micro-network

  order-service:
    build: ./order-service
    container_name: order-service
    env_file: 
      - ./order-service/.env
    depends_on:
      - order-db
      - rabbitmq
      - redis
    networks:
      - micro-network

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5435:5432"
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - micro-network
  payment-service:
    build: ./payment-service
    container_name: payment-service
    env_file: 
      - ./payment-service/.env
    depends_on:
      - payment-db
      - rabbitmq
    networks:
      - micro-network

  payment-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5436:5432"
    volumes:
      - payment_data:/var/lib/postgresql/data
    networks:
      - micro-network
  nginx:
    image: nginx:alpine
    container_name: micro-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - product-service
      - user-service
      - order-service
      - payment-service
    networks:
      - micro-network
  client-service:
    build: ./client-service
    container_name: client-service
    restart: always
    networks:
      - micro-network

volumes:
  product_data:
  user_data:
  order_data:
  payment_data:

networks:
  micro-network:
    driver: bridge