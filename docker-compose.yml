version: '3.9'

services:
  product-service:
    build: ./product-service
    container_name: product-service
    env_file: 
      - ./product-service/.env
    depends_on:
      - product-db
    networks:
      - micro-network

  product-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - product_data:/var/lib/postgresql/data
    networks:
      - micro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
  user-service:
    build: ./user-service
    container_name: user-service
    env_file: 
      - ./user-service/.env
    depends_on:
      - user-db
    networks:
      - micro-network

  user-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - micro-network

  order-service:
    build: ./order-service
    container_name: order-service
    env_file: 
      - ./order-service/.env
    depends_on:
      - order-db
      - product-service
      - user-service
    networks:
      - micro-network

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: em_order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - micro-network

  nginx:
    image: nginx:alpine
    container_name: micro-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - product-service
      - user-service
      - order-service
    networks:
      - micro-network
  client-service:
    build: ./client-service
    container_name: client-service
    restart: always
    networks:
      - micro-network

volumes:
  product_data:
  user_data:
  order_data:

networks:
  micro-network:
    driver: bridge