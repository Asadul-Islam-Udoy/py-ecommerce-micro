version: '3.9'

services:
  product-service:
    build: ./product-service
    container_name: product-service
    env_file: .env
    depends_on:
      - product-db
    networks:
      - micro-network

  product-db:
    image: postgres:15
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - product_data:/var/lib/postgresql/data
    networks:
      - micro-network

  user-service:
    build: ./user-service
    container_name: user-service
    env_file: .env
    depends_on:
      - user-db
    networks:
      - micro-network

  user-db:
    image: postgres:15
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - micro-network

  order-service:
    build: ./order-service
    container_name: order-service
    env_file: .env
    depends_on:
      - order-db
      - product-service
      - user-service
    networks:
      - micro-network

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - micro-network

  nginx:
    image: nginx:alpine
    container_name: micro-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - product-service
      - user-service
      - order-service
    networks:
      - micro-network

volumes:
  product_data:
  user_data:
  order_data:

networks:
  micro-network:
    driver: bridge